<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GroveTrack – Rental & Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="edit_rental_payment.css"/>
</head>
<body>

  <!-- Top navbar -->
  <div class="top-nav">
    <div class="brand">GR<span>A</span>VE<span>T</span>RACK</div>
    <div class="nav-actions">
      <button class="nav-btn btn-save"   onclick="handleSave()">Save</button>
      <button class="nav-btn btn-update" onclick="handleUpdate()">Update</button>
      <button class="nav-btn btn-delete" onclick="handleDelete()">Delete</button>
      <button class="nav-btn btn-add"    onclick="handleAdd()">Add Payment<br>Record</button>
      <button class="btn-power" aria-label="Power off" onclick="confirmExit()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">

    <div class="field-group">
      <label class="field-label" for="deceasedName">Deceased Name</label>
      <input class="field-input" type="text" id="deceasedName" placeholder="Enter deceased name"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="plotLocation">Plot location</label>
      <input class="field-input" type="text" id="plotLocation" placeholder="Enter plot location"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="rentalStart">Rental Start Date</label>
      <input class="field-input" type="date" id="rentalStart"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="rentalEnd">Rental End Date</label>
      <input class="field-input" type="date" id="rentalEnd"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="amountPaid">Amount Paid</label>
      <input class="field-input" type="number" id="amountPaid" placeholder="e.g. 5000"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="paymentDate">Payment Date</label>
      <input class="field-input" type="date" id="paymentDate"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="paymentMethod">Payment Method</label>
      <input class="field-input" type="text" id="paymentMethod" placeholder="e.g. Cash, GCash"/>
    </div>

    <div class="field-group">
      <label class="field-label" for="paymentStatus">Payment Status</label>
      <input class="field-input" type="text" id="paymentStatus" placeholder="e.g. Paid, Pending"/>
    </div>

  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="bottom-btn bb-default" onclick="setActive(this)">Dashboard</button>
    <button class="bottom-btn bb-default" onclick="setActive(this)">Burial Records</button>
    <button class="bottom-btn bb-default" onclick="setActive(this)">Plot Mapping</button>
    <button class="bottom-btn bb-default" onclick="setActive(this)">Vacancy<br>Monitoring</button>
    <button class="bottom-btn bb-active"  onclick="setActive(this)">Rental &amp;<br>Payment</button>
    <button class="bottom-btn bb-default" onclick="setActive(this)">Reports</button>
  </div>

  <div id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    function getFields() {
      return [
        document.getElementById('deceasedName'),
        document.getElementById('plotLocation'),
        document.getElementById('rentalStart'),
        document.getElementById('rentalEnd'),
        document.getElementById('amountPaid'),
        document.getElementById('paymentDate'),
        document.getElementById('paymentMethod'),
        document.getElementById('paymentStatus'),
      ];
    }

    function handleSave() {
      const fields = getFields();
      let empty = false;
      fields.forEach(f => {
        if (!f.value.trim()) { f.style.borderColor = '#ef4444'; empty = true; }
        else f.style.borderColor = '#cbd5e1';
      });
      if (empty) { toast('Please fill in all required fields.', '#ef4444'); return; }
      toast('Payment record saved successfully!', '#22c55e');
    }

    function handleUpdate() {
      toast('Record updated successfully!', '#2563eb');
    }

    function handleDelete() {
      if (confirm('Are you sure you want to delete this record?')) {
        getFields().forEach(f => { f.value = ''; f.style.borderColor = '#cbd5e1'; });
        toast('Record deleted.', '#ef4444');
      }
    }

    function handleAdd() {
      getFields().forEach(f => { f.value = ''; f.style.borderColor = '#cbd5e1'; });
      toast('Form cleared. Add a new payment record.', '#2563eb');
    }

    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    function confirmExit() {
      if (confirm('Are you sure you want to exit?')) window.close();
    }

    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  </script>
</body>
</html>
