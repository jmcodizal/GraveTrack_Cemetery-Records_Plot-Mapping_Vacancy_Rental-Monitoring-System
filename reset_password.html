<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraveTrack – Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/reset_password.css"/>
</head>
<body>

  <!-- Waves -->
  <div class="wave-wrap">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <!-- Navbar -->
  <nav>
    <div class="brand">GR<span>A</span>VE<span>T</span>RACK</div>
  </nav>

  <!-- Main -->
  <main>
    <div class="reset-card">
      <div class="card-title">Reset Password</div>

      <div class="field-group">
        <label class="field-label" for="resetEmail">Enter registered email</label>
        <input class="field-input" type="email" id="resetEmail" placeholder="Enter your email here"/>
      </div>

      <div class="btn-row">
        <button class="btn-send" onclick="handleSend()">Send Reset Link</button>
        <button class="btn-cancel" onclick="handleCancel()">Cancel</button>
      </div>
    </div>
  </main>

  <div id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function handleSend() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) {
        document.getElementById('resetEmail').style.borderColor = '#ef4444';
        toast('Please enter your registered email.', '#ef4444');
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('resetEmail').style.borderColor = '#ef4444';
        toast('Please enter a valid email address.', '#ef4444');
        return;
      }
      document.getElementById('resetEmail').style.borderColor = '#bfdbfe';
      toast('Reset link sent! Check your email.', '#22c55e');
    }

    function handleCancel() {
window.location.href = 'login.php';
    }

    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }
  </script>
</body>
</html>
