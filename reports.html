// ── SELECT REPORT ──
function selectReport(btn, type) {
  document.querySelectorAll('.report-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedType = type;
}

// ── GENERATE REPORT ──
function generateReport() {
  if (!selectedType) {
    toast('Please select a report type first.', '#ef4444');
    return;
  }

  const data = reportData[selectedType];
  const placeholder = document.getElementById('previewPlaceholder');
  const content = document.getElementById('previewContent');

  placeholder.style.display = 'none';
  content.style.display = 'block';

  let html = `<div class="preview-title">${selectedType}</div>`;
  html += '<table><thead><tr>';
  data.headers.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => { html += `<td>${cell}</td>`; });
    html += '</tr>';
  });
  html += '</tbody></table>';

  content.innerHTML = html;
  toast(`${selectedType} generated.`, '#22c55e');
}

// ── PRINT ──
function printReport() {
  if (!selectedType) { toast('Please generate a report first.', '#ef4444'); return; }
  window.print();
}

// ── EXPORT PDF ──
function exportPDF() {
  if (!selectedType) { toast('Please generate a report first.', '#ef4444'); return; }
  toast('Exporting to PDF…', '#2563eb');
}

// ── EXPORT EXCEL ──
function exportExcel() {
  if (!selectedType) { toast('Please generate a report first.', '#ef4444'); return; }
  toast('Exporting to Excel…', '#2563eb');
}

// ── BOTTOM NAV ──
function setActive(el) {
  document.querySelectorAll('.bottom-btn').forEach(b => {
    b.classList.remove('bb-active');
    b.classList.add('bb-default');
  });
  el.classList.remove('bb-default');
  el.classList.add('bb-active');
}

// ── POWER ──
function confirmExit() {
  if (confirm('Are you sure you want to exit?')) window.close();
}

// ── TOAST ──
function toast(msg, color = '#2563eb') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.borderLeft = `3px solid ${color}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
  </script>
