<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraveTrack – Plot Mapping</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8f0fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .top-nav {
      background: #1a3a6e;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #ffffff;
      user-select: none;
    }
    .brand span { color: #60a5fa; }

    .nav-actions { display: flex; align-items: center; gap: .55rem; }

    .nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: .38rem 1.1rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      text-align: center;
    }
    .nav-btn:hover { opacity: .85; transform: translateY(-1px); }
    .nav-btn:active { transform: translateY(0); }

    .btn-view    { background: #2563eb; color: #fff; }
    .btn-edit    { background: #dbeafe; color: #1e3a8a; }
    .btn-add     { background: #dbeafe; color: #1e3a8a; }

    .btn-power {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #ef4444;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-power:hover { background: #dc2626; transform: scale(1.08); }
    .btn-power svg { width: 16px; height: 16px; }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      background: #f8fafc;
      margin: .8rem;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
      overflow-y: auto;
    }

    /* ── MAP CARD ── */
    .map-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: .9rem 1rem;
    }

    .map-title {
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: .5rem;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: .9rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .3rem;
      font-size: .75rem;
      font-weight: 500;
      color: #374151;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .dot-vacant   { background: #ef4444; }
    .dot-occupied { background: #22c55e; }
    .dot-reserved { background: #eab308; }

    /* ── PLOT GRID ── */
    .plot-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .7rem;
    }

    .plot-card {
      width: 120px;
      height: 80px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: .6rem .8rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      user-select: none;
    }
    .plot-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
    }
    .plot-card.selected {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }

    .plot-vacant   { background: #ef4444; }
    .plot-occupied { background: #22c55e; }
    .plot-reserved { background: #eab308; }

    .plot-id {
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      color: #ffffff;
    }
    .plot-type {
      font-size: .72rem;
      font-weight: 400;
      color: rgba(255,255,255,.88);
    }
    .plot-status {
      font-size: .72rem;
      font-weight: 600;
      color: rgba(255,255,255,.95);
    }

    /* ── DETAIL CARD ── */
    .detail-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: .9rem 1rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .55rem 1.5rem;
    }

    .detail-item { display: flex; flex-direction: column; gap: .1rem; }

    .detail-label {
      font-size: .75rem;
      font-weight: 600;
      color: #374151;
    }
    .detail-value {
      font-size: .82rem;
      color: #1e293b;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: #dbeafe;
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .bottom-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      padding: .5rem .9rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
    }
    .bottom-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .bottom-btn:active { transform: translateY(0); }

    .bb-default { background: #1e3a6e; color: #ffffff; }
    .bb-active  { background: #60a5fa; color: #1e293b; }
    .bb-default:hover { background: #2563eb; }

    /* ── TOAST ── */
    #toastWrap {
      position: fixed;
      bottom: 5rem; right: 1rem;
      z-index: 999;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .toast-item {
      background: #1a3a6e;
      color: #fff;
      padding: .55rem 1rem;
      border-radius: 8px;
      font-size: .82rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      animation: slideIn .3s ease both;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <!-- Top navbar -->
  <div class="top-nav">
    <div class="brand">GR<span>O</span>VE<span>T</span>RACK</div>
    <div class="nav-actions">
      <button class="nav-btn btn-view" onclick="viewDetails()">View Details</button>
      <button class="nav-btn btn-edit" onclick="editPlot()">Edit Plot</button>
      <button class="nav-btn btn-add"  onclick="addPlot()">Add New Plot</button>
      <button class="btn-power" aria-label="Power off" onclick="confirmExit()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">

    <!-- Map card -->
    <div class="map-card">
      <div class="map-title">Visual Cemetery Map</div>

      <!-- Legend -->
      <div class="legend">
        <div class="legend-item"><div class="legend-dot dot-vacant"></div> Vacant</div>
        <div class="legend-item"><div class="legend-dot dot-occupied"></div> Occupied</div>
        <div class="legend-item"><div class="legend-dot dot-reserved"></div> Reserved</div>
      </div>

      <!-- Plot grid -->
      <div class="plot-grid" id="plotGrid"></div>
    </div>

    <!-- Detail card -->
    <div class="detail-card" id="detailCard">
      <div class="detail-grid" id="detailGrid">
        <div class="detail-item">
          <div class="detail-label">Block Number:</div>
          <div class="detail-value" id="dBlock">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Section:</div>
          <div class="detail-value" id="dSection">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Lot Number:</div>
          <div class="detail-value" id="dLot">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Plot Type:</div>
          <div class="detail-value" id="dType">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Status:</div>
          <div class="detail-value" id="dStatus">—</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="bottom-btn bb-default" onclick="window.location.href='dashboard.html';setActive(this)">Dashboard</button>
    <button class="bottom-btn bb-active"  onclick="window.location.href='burial_records.html'; setActive(this); ">Burial Records</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='plot_mapping.html'; setActive(this)">Plot Mapping</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='vacancy.html'; setActive(this)">Vacancy<br>Monitoring</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='rental_payment.html'; setActive(this)">Rental &amp;<br>Payment</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='reports.html'; setActive(this)">Reports</button>
  </div>

  <div id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── PLOT DATA ──
    const plots = [
      { id: 'A-1-1', type: 'Ground',    status: 'Occupied', block: 'A', section: '1', lot: '1' },
      { id: 'A-1-2', type: 'Ground',    status: 'Vacant',   block: 'A', section: '1', lot: '2' },
      { id: 'A-1-3', type: 'Apartment', status: 'Reserved', block: 'A', section: '1', lot: '3' },
      { id: 'A-2-1', type: 'Ground',    status: 'Occupied', block: 'A', section: '2', lot: '1' },
      { id: 'A-2-2', type: 'Apartment', status: 'Vacant',   block: 'A', section: '2', lot: '2' },
      { id: 'B-1-1', type: 'Ground',    status: 'Reserved', block: 'B', section: '1', lot: '1' },
      { id: 'B-1-2', type: 'Lawn',      status: 'Vacant',   block: 'B', section: '1', lot: '2' },
      { id: 'B-2-1', type: 'Lawn',      status: 'Occupied', block: 'B', section: '2', lot: '1' },
    ];

    const statusClass = {
      'Vacant':   'plot-vacant',
      'Occupied': 'plot-occupied',
      'Reserved': 'plot-reserved',
    };

    let selectedPlot = null;

    // ── RENDER PLOTS ──
    function renderPlots() {
      const grid = document.getElementById('plotGrid');
      grid.innerHTML = '';
      plots.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = `plot-card ${statusClass[p.status]}`;
        card.dataset.index = i;
        card.innerHTML = `
          <div class="plot-id">${p.id}</div>
          <div class="plot-type">${p.type}</div>
          <div class="plot-status">${p.status}</div>
        `;
        card.addEventListener('click', () => selectPlot(card, p));
        grid.appendChild(card);
      });

     
      const defaultCard = grid.children[2];
      selectPlot(defaultCard, plots[2]);
    }

    // ── SELECT PLOT ──
    function selectPlot(card, plot) {
      document.querySelectorAll('.plot-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedPlot = plot;
      document.getElementById('dBlock').textContent   = plot.block;
      document.getElementById('dSection').textContent = plot.section;
      document.getElementById('dLot').textContent     = plot.lot;
      document.getElementById('dType').textContent    = plot.type;
      document.getElementById('dStatus').textContent  = plot.status;
    }

    // ── BOTTOM NAV ──
    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    // ── NAV ACTIONS ──
    function viewDetails() {
      if (!selectedPlot) { toast('Please select a plot first.', '#ef4444'); return; }
      toast(`Viewing details for plot ${selectedPlot.id}`, '#2563eb');
    }
    function editPlot() {
      if (!selectedPlot) { toast('Please select a plot first.', '#ef4444'); return; }
      toast(`Editing plot ${selectedPlot.id}`, '#eab308');
    }
    function addPlot() { toast('Add New Plot form opened.', '#22c55e'); }
    function confirmExit() {
      if (confirm('Are you sure you want to exit?')) window.close();
    }

    // ── TOAST ──
    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    renderPlots();
  </script>
</body>
</html>
