<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraveTrack – Add New Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/abr_style.css"> <!--abr ang name ng css-->
</head>
<body>

  <!-- Top navbar -->
  <div class="top-nav">
    <div class="brand">GR<span>A</span>VE<span>T</span>RACK</div>
    <div class="nav-actions">
      <button class="nav-btn btn-save"   onclick="handleSave()">Save</button>
      <button class="nav-btn btn-clear"  onclick="handleClear()">Clear</button>
      <button class="nav-btn btn-cancel" onclick="handleCancel()">Cancel</button>
      <button class="btn-power" aria-label="Power off">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">
    <div class="section-title">Burial Record Management</div>
    <div class="section-subtitle">Burial Records List</div>

    <div class="form-grid">

      <div class="field-group">
        <label class="field-label" for="fullName">Full Name</label>
        <input class="field-input" type="text" id="fullName" placeholder="Enter full name"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="dateOfBirth">Date of Birth</label>
        <input class="field-input" type="date" id="dateOfBirth"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="dateOfDeath">Date of Death</label>
        <input class="field-input" type="date" id="dateOfDeath"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="dateOfBurial">Date of Burial</label>
        <input class="field-input" type="date" id="dateOfBurial"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="gender">Gender</label>
        <input class="field-input" type="text" id="gender" placeholder="e.g. Male / Female"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="contactPerson">Contact Person</label>
        <input class="field-input" type="text" id="contactPerson" placeholder="Enter contact person"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="contactNumber">Contact Number</label>
        <input class="field-input" type="tel" id="contactNumber" placeholder="Enter contact number"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="address">Address</label>
        <input class="field-input" type="text" id="address" placeholder="Enter address"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="plotLocation">Plot Location</label>
        <input class="field-input" type="text" id="plotLocation" placeholder="Enter plot location"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="plotBlock">Plot Block</label>
        <input class="field-input" type="text" id="plotBlock" placeholder="Enter plot block"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="plotBlock2">Plot Block</label>
        <input class="field-input" type="text" id="plotBlock2" placeholder="Enter plot block"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="burialType">Burial Type</label>
        <input class="field-input" type="text" id="burialType" placeholder="Enter burial type"/>
      </div>

    </div>
  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="bottom-btn bb-default" onclick="window.location.href='dashboard.html';setActive(this)">Dashboard</button>
    <button class="bottom-btn bb-active"  onclick="window.location.href='burial_records.html'; setActive(this); ">Burial Records</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='plot_mapping.html'; setActive(this)">Plot Mapping</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='vacancy.html'; setActive(this)">Vacancy<br>Monitoring</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='rental_payment.html'; setActive(this)">Rental &amp;<br>Payment</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='reports.html'; setActive(this)">Reports</button>
  </div>

  <!-- Toast -->
  <div id="toastWrap" style="position:fixed;bottom:5rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:.4rem;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── BOTTOM NAV ACTIVE ──
    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    // ── TOAST ──
    function toast(msg, type = 'info') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.style.cssText = `
        background: #1a3a6e; color:#fff;
        padding:.55rem 1rem; border-radius:8px;
        font-size:.82rem; font-family:'DM Sans',sans-serif;
        box-shadow:0 4px 16px rgba(0,0,0,.25);
        border-left:3px solid ${type==='error'?'#ef4444':type==='success'?'#22c55e':'#60a5fa'};
        animation: fadeInRight .3s ease both;
      `;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ── SAVE ──
    function handleSave() {
      const fields = document.querySelectorAll('.field-input');
      let empty = false;
      fields.forEach(f => {
        if (!f.value.trim()) { f.style.borderColor = '#ef4444'; empty = true; }
        else f.style.borderColor = '#cbd5e1';
      });
      if (empty) { toast('Please fill in all required fields.', 'error'); return; }
      toast('Record saved successfully!', 'success');
    }

    // ── CLEAR ──
    function handleClear() {
      document.querySelectorAll('.field-input').forEach(f => {
        f.value = '';
        f.style.borderColor = '#cbd5e1';
      });
      toast('Form cleared.', 'info');
    }

    // ── CANCEL ──
    function handleCancel() {
      handleClear();
      toast('Action cancelled.', 'info');
    }

    // ── POWER ──
    document.querySelector('.btn-power').addEventListener('click', () => {
      if (confirm('Are you sure you want to exit?')) window.close();
    });
  </script>
</body>
</html>
