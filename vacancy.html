<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GroveTrack – Vacancy Monitoring</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8f0fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .top-nav {
      background: #1a3a6e;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #ffffff;
      user-select: none;
    }
    .brand span { color: #60a5fa; }

    .nav-actions { display: flex; align-items: center; gap: .55rem; }

    .nav-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: .38rem 1.1rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      text-align: center;
      line-height: 1.3;
    }
    .nav-btn:hover { opacity: .85; transform: translateY(-1px); }
    .nav-btn:active { transform: translateY(0); }

    .btn-generate { background: #2563eb; color: #fff; }
    .btn-export   { background: #dbeafe; color: #1e3a8a; }
    .btn-refresh  { background: #dbeafe; color: #1e3a8a; }

    .btn-power {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #ef4444;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-power:hover { background: #dc2626; transform: scale(1.08); }
    .btn-power svg { width: 16px; height: 16px; }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      background: #f1f5f9;
      margin: .8rem;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
      overflow-y: auto;
    }

    /* ── STAT CARDS ROW ── */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
    }

    .stat-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: .9rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .stat-label {
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
    }

    /* ── FILTER ROW ── */
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
    }

    .filter-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: .9rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .filter-label {
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
    }

    .filter-input {
      width: 100%;
      background: #f0f6ff;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      padding: .32rem .7rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      color: #1e293b;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .filter-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .filter-input::placeholder { color: #94a3b8; }

    /* ── RESULTS TABLE ── */
    .table-card {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
    }
    thead th {
      font-size: .73rem;
      font-weight: 600;
      color: #64748b;
      padding: .5rem .9rem;
      text-align: left;
      border-bottom: 1.5px solid #e2e8f0;
      background: #f8fafc;
      white-space: nowrap;
    }
    tbody td {
      font-size: .78rem;
      color: #334155;
      padding: .5rem .9rem;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f0f6ff; }

    .badge-status {
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .6rem;
      border-radius: 20px;
      display: inline-block;
    }
    .badge-vacant   { background: #fee2e2; color: #991b1b; }
    .badge-occupied { background: #dcfce7; color: #166534; }
    .badge-reserved { background: #fef9c3; color: #854d0e; }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
      color: #94a3b8;
      font-size: .82rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: #dbeafe;
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .bottom-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      padding: .5rem .9rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
    }
    .bottom-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .bottom-btn:active { transform: translateY(0); }

    .bb-default { background: #1e3a6e; color: #ffffff; }
    .bb-active  { background: #60a5fa; color: #1e293b; }
    .bb-default:hover { background: #2563eb; }

    /* ── TOAST ── */
    #toastWrap {
      position: fixed;
      bottom: 5rem; right: 1rem;
      z-index: 999;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .toast-item {
      background: #1a3a6e;
      color: #fff;
      padding: .55rem 1rem;
      border-radius: 8px;
      font-size: .82rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      animation: slideIn .3s ease both;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <!-- Top navbar -->
  <div class="top-nav">
    <div class="brand">GR<span>O</span>VE<span>T</span>RACK</div>
    <div class="nav-actions">
      <button class="nav-btn btn-generate" onclick="generateReport()">Generate<br>Vacancy Report</button>
      <button class="nav-btn btn-export"   onclick="exportPDF()">Export to PDF</button>
      <button class="nav-btn btn-refresh"  onclick="refreshData()">Refresh</button>
      <button class="btn-power" aria-label="Power off" onclick="confirmExit()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">

    <!-- Stat cards -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Total Vacant Plots</div>
        <div class="stat-value" id="statVacant">52</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Occupied Plots</div>
        <div class="stat-value" id="statOccupied">198</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <div class="filter-card">
        <div class="filter-label">Filter by Section</div>
        <input class="filter-input" type="text" id="filterSection" placeholder="e.g. Section 1" oninput="applyFilters()"/>
      </div>
      <div class="filter-card">
        <div class="filter-label">Filter by Plot Type</div>
        <input class="filter-input" type="text" id="filterType" placeholder="e.g. Ground, Apartment" oninput="applyFilters()"/>
      </div>
    </div>

    <!-- Results table -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Plot ID</th>
              <th>Block</th>
              <th>Section</th>
              <th>Lot</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">No plots match the selected filters.</div>
      </div>
    </div>

  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="bottom-btn bb-default" onclick="window.location.href='dashboard.html';setActive(this)">Dashboard</button>
    <button class="bottom-btn bb-active"  onclick="window.location.href='burial_records.html'; setActive(this); ">Burial Records</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='plot_mapping.html'; setActive(this)">Plot Mapping</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='vacancy.html'; setActive(this)">Vacancy<br>Monitoring</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='rental_payment.html'; setActive(this)">Rental &amp;<br>Payment</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='reports.html'; setActive(this)">Reports</button>
  </div>

  <div id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── SAMPLE PLOT DATA ──
    const allPlots = [
      { id: 'A-1-1', block: 'A', section: 'Section 1', lot: '1', type: 'Ground',    status: 'Occupied' },
      { id: 'A-1-2', block: 'A', section: 'Section 1', lot: '2', type: 'Ground',    status: 'Vacant'   },
      { id: 'A-1-3', block: 'A', section: 'Section 1', lot: '3', type: 'Apartment', status: 'Reserved' },
      { id: 'A-2-1', block: 'A', section: 'Section 2', lot: '1', type: 'Ground',    status: 'Occupied' },
      { id: 'A-2-2', block: 'A', section: 'Section 2', lot: '2', type: 'Apartment', status: 'Vacant'   },
      { id: 'A-2-3', block: 'A', section: 'Section 2', lot: '3', type: 'Lawn',      status: 'Vacant'   },
      { id: 'B-1-1', block: 'B', section: 'Section 1', lot: '1', type: 'Ground',    status: 'Reserved' },
      { id: 'B-1-2', block: 'B', section: 'Section 1', lot: '2', type: 'Lawn',      status: 'Vacant'   },
      { id: 'B-2-1', block: 'B', section: 'Section 2', lot: '1', type: 'Lawn',      status: 'Occupied' },
      { id: 'B-2-2', block: 'B', section: 'Section 2', lot: '2', type: 'Ground',    status: 'Occupied' },
    ];

    const badgeClass = {
      'Vacant':   'badge-vacant',
      'Occupied': 'badge-occupied',
      'Reserved': 'badge-reserved',
    };

    function renderTable(data) {
      const body = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');
      body.innerHTML = '';
      if (!data.length) {
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';
      data.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${p.block}</td>
          <td>${p.section}</td>
          <td>${p.lot}</td>
          <td>${p.type}</td>
          <td><span class="badge-status ${badgeClass[p.status]}">${p.status}</span></td>
        `;
        body.appendChild(tr);
      });
    }

    function applyFilters() {
      const sec  = document.getElementById('filterSection').value.toLowerCase().trim();
      const type = document.getElementById('filterType').value.toLowerCase().trim();
      const filtered = allPlots.filter(p =>
        p.section.toLowerCase().includes(sec) &&
        p.type.toLowerCase().includes(type)
      );
      renderTable(filtered);
      updateStats(filtered);
    }

    function updateStats(data) {
      document.getElementById('statVacant').textContent   = data.filter(p => p.status === 'Vacant').length   || 0;
      document.getElementById('statOccupied').textContent = data.filter(p => p.status === 'Occupied').length || 0;
    }

    function refreshData() {
      document.getElementById('filterSection').value = '';
      document.getElementById('filterType').value = '';
      renderTable(allPlots);
      document.getElementById('statVacant').textContent   = 52;
      document.getElementById('statOccupied').textContent = 198;
      toast('Data refreshed.', '#22c55e');
    }

    function generateReport() { toast('Generating vacancy report…', '#2563eb'); }
    function exportPDF()      { toast('Exporting to PDF…', '#2563eb'); }
    function confirmExit()    { if (confirm('Are you sure you want to exit?')) window.close(); }

    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    renderTable(allPlots);
  </script>
</body>
</html>
