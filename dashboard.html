  <script>
    const stats = { burial: "", occupied: "", vacant: "", overdue: "" };

    // ── INIT ──
    function init() {
      document.getElementById('statBurial').textContent   = stats.burial;
      document.getElementById('statOccupied').textContent = stats.occupied;
      document.getElementById('statVacant').textContent   = stats.vacant;
      document.getElementById('statOverdue').textContent  = stats.overdue;
      renderTable(transactions);
    }

    function renderTable(data) {
      const body = document.getElementById('txBody');
      const empty = document.getElementById('emptyState');
      body.innerHTML = '';
      if (!data.length) { empty.style.display = 'flex'; return; }
      empty.style.display = 'none';
      const badgeClass = { burial: 'badge-burial', rental: 'badge-rental', payment: 'badge-payment' };
      data.forEach(tx => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${tx.id}</td>
          <td>${tx.name}</td>
          <td>${tx.date}</td>
          <td>${tx.amount}</td>
          <td><span class="badge-type ${badgeClass[tx.type]}">${tx.type.charAt(0).toUpperCase()+tx.type.slice(1)}</span></td>
          <td><button class="view-btn" onclick="viewDetail('${tx.id}')">View</button></td>
        `;
        body.appendChild(tr);
      });
    }

    // ── BOTTOM NAV ──
    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    // ── STAT CARD SELECT ──
    function selectCard(el) {
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-card'));
      el.classList.add('active-card');
    }

    // ── ACTIONS ──
    function generateReport() { toast('Generating quick report…', '#2563eb'); }
    function refreshData()    { init(); toast('Data refreshed.', '#22c55e'); }
    function viewDetail(id)   { toast(`Viewing details for ${id}`, '#2563eb'); }
    function confirmExit()    { if (confirm('Are you sure you want to exit?')) window.close(); }

    // ── TOAST ──
    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    init();
  </script>
