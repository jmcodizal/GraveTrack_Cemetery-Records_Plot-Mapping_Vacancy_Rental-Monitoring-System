<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GroveTrack – Burial Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8f0fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .top-nav {
      background: #1a3a6e;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #ffffff;
      user-select: none;
    }
    .brand span { color: #60a5fa; }

    .nav-actions { display: flex; align-items: center; gap: .55rem; }

    .btn-add-record {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: .38rem 1.1rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #dbeafe;
      color: #1e3a8a;
      line-height: 1.3;
      text-align: center;
      transition: opacity .2s, transform .15s;
    }
    .btn-add-record:hover { opacity: .85; transform: translateY(-1px); }
    .btn-add-record:active { transform: translateY(0); }

    .btn-power {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #ef4444;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-power:hover { background: #dc2626; transform: scale(1.08); }
    .btn-power svg { width: 16px; height: 16px; }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      background: #f8fafc;
      margin: .8rem;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
      overflow-y: auto;
      border: 2px solid #c4b5fd;
    }

    /* ── SEARCH BOX ── */
    .search-box {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: .8rem 1rem;
    }
    .search-label {
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: .4rem;
    }
    .search-input {
      width: 100%;
      max-width: 240px;
      background: #f0f6ff;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      padding: .32rem .7rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      color: #1e293b;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .search-input::placeholder { color: #94a3b8; }

    /* ── TABLE BOX ── */
    .table-box {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-header {
      padding: .7rem 1rem .4rem;
      border-bottom: 1.5px solid #e2e8f0;
    }
    .table-title {
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      color: #1e293b;
    }
    .table-subtitle {
      font-size: .75rem;
      font-weight: 500;
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .table-wrap { overflow-x: auto; flex: 1; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    thead th {
      font-size: .73rem;
      font-weight: 600;
      color: #64748b;
      padding: .5rem .8rem;
      text-align: left;
      border-bottom: 1.5px solid #e2e8f0;
      background: #f8fafc;
      white-space: nowrap;
    }
    tbody td {
      font-size: .78rem;
      color: #334155;
      padding: .5rem .8rem;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f0f6ff; }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      color: #94a3b8;
      font-size: .82rem;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: #dbeafe;
      padding: .6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .bottom-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      padding: .5rem .9rem;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
    }
    .bottom-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .bottom-btn:active { transform: translateY(0); }

    .bb-default { background: #1e3a6e; color: #ffffff; }
    .bb-active  { background: #60a5fa; color: #1e293b; }
    .bb-default:hover { background: #2563eb; }

    /* ── TOAST ── */
    #toastWrap {
      position: fixed;
      bottom: 5rem; right: 1rem;
      z-index: 999;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .toast-item {
      background: #1a3a6e;
      color: #fff;
      padding: .55rem 1rem;
      border-radius: 8px;
      font-size: .82rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      animation: slideIn .3s ease both;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <!-- Top navbar -->
  <div class="top-nav">
    <div class="brand">GR<span>A</span>VE<span>T</span>RACK</div>
    <div class="nav-actions">
      <button class="btn-add-record" onclick="window.location.href='burial-records.html'">Add New<br>Record</button>
      <button class="btn-power" aria-label="Power off" onclick="confirmExit()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content area -->
  <div class="content-area">

    <!-- Search -->
    <div class="search-box">
      <div class="search-label">Search Burial Record</div>
      <input
        class="search-input"
        type="text"
        id="searchInput"
        placeholder="Search by name or ID..."
        oninput="filterRecords()"
      />
    </div>

    <!-- Table -->
    <div class="table-box">
      <div class="table-header">
        <div class="table-title">Burial Record Management</div>
        <div class="table-subtitle">Burial Records List</div>
      </div>
      <div class="table-wrap">
        <table id="recordsTable">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Date of Death</th>
              <th>Date of Burial</th>
              <th>Gender</th>
              <th>Contact Person</th>
              <th>Contact Number</th>
              <th>Address</th>
              <th>Plot Location</th>
              <th>Burial Type</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState">No burial records found.</div>
      </div>
    </div>

  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="bottom-btn bb-default" onclick="window.location.href='dashboard.html';setActive(this)">Dashboard</button>
    <button class="bottom-btn bb-active"  onclick="window.location.href='burial_records.html'; setActive(this); ">Burial Records</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='plot_mapping.html'; setActive(this)">Plot Mapping</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='vacancy.html'; setActive(this)">Vacancy<br>Monitoring</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='rental_payment.html'; setActive(this)">Rental &amp;<br>Payment</button>
    <button class="bottom-btn bb-default" onclick="window.location.href='reports.html'; setActive(this)">Reports</button>
  </div>

  <div id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    let filtered = [...records];

    function renderTable(data) {
      const body = document.getElementById('recordsBody');
      const empty = document.getElementById('emptyState');
      body.innerHTML = '';
      if (!data.length) {
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';
      data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.name}</td>
          <td>${r.dateOfDeath}</td>
          <td>${r.dateOfBurial}</td>
          <td>${r.gender}</td>
          <td>${r.contactPerson}</td>
          <td>${r.contactNumber}</td>
          <td>${r.address}</td>
          <td>${r.plotLocation}</td>
          <td>${r.burialType}</td>
        `;
        body.appendChild(tr);
      });
    }

    function filterRecords() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      filtered = records.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.contactPerson.toLowerCase().includes(q) ||
        r.plotLocation.toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    function setActive(el) {
      document.querySelectorAll('.bottom-btn').forEach(b => {
        b.classList.remove('bb-active');
        b.classList.add('bb-default');
      });
      el.classList.remove('bb-default');
      el.classList.add('bb-active');
    }

    function confirmExit() {
      if (confirm('Are you sure you want to exit?')) window.close();
    }

    function toast(msg, color = '#2563eb') {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast-item';
      el.style.borderLeft = `3px solid ${color}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    renderTable(records);
  </script>
</body>
</html>
