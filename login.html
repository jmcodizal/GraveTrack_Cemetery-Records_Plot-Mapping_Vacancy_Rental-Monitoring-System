<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GroveTrack – Log In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #d6e8f8 0%, #b3d4f0 100%);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      transition: background 0.4s;
    }
    body.dark {
      background: linear-gradient(160deg, #0d1b2e 0%, #0f2a4a 100%);
    }

    /* ── NAVBAR ── */
    nav {
      position: relative; z-index: 10;
      background: #1a3a6e;
      padding: 0 1.5rem;
      height: 54px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      transition: background 0.4s;
    }
    body.dark nav { background: #0f172a; }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: .03em;
      color: #ffffff;
      user-select: none;
    }
    .brand span { color: #60a5fa; }

    .nav-right { display: flex; align-items: center; gap: .75rem; }

    .theme-toggle {
      width: 52px; height: 28px;
      background: #2563eb;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background .35s;
      display: flex; align-items: center; padding: 0 5px;
    }
    body.dark .theme-toggle { background: #334155; }
    .theme-toggle .knob {
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      left: 5px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }
 
    .back-btn {
      width: 34px; height: 34px;
      background: #2563eb;
      border-radius: 50%;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: background .2s, transform .2s;
      text-decoration: none;
    }
    .back-btn:hover { background: #60a5fa; transform: scale(1.1); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 5;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── CARD ── */
    .auth-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.2rem 2.4rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 40px rgba(30,58,138,0.13), 0 2px 8px rgba(0,0,0,0.06);
      transition: background .4s;
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
    }
    body.dark .auth-card { background: #162032; }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── TABS ── */
    .tab-wrap {
      background: #dbeafe;
      border-radius: 99px;
      padding: 4px;
      display: inline-flex;
      width: 100%;
      margin-bottom: 1.6rem;
      transition: background .4s;
    }
    body.dark .tab-wrap { background: #1e3a5f; }

    .tab-btn {
      flex: 1;
      border: none;
      border-radius: 99px;
      padding: .45rem 0;
      font-family: 'Syne', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      color: #64748b;
      background: transparent;
      transition: background .3s, color .3s, box-shadow .3s;
      text-decoration: none;
      text-align: center;
    }
    body.dark .tab-btn { color: #94a3b8; }
    .tab-btn.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 3px 10px rgba(37,99,235,.35);
    }

    /* ── FORM ── */
    .panel-subtitle {
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: .97rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1.4rem;
    }
    body.dark .panel-subtitle { color: #e2e8f0; }

    .form-group { margin-bottom: 1rem; }

    .field-label {
      font-size: .88rem;
      font-weight: 500;
      color: #1e293b;
      margin-bottom: .35rem;
      display: block;
    }
    body.dark .field-label { color: #e2e8f0; }

    .field-input {
      width: 100%;
      background: #f0f6ff;
      border: 1.5px solid #bfdbfe;
      border-radius: 10px;
      padding: .6rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: #1e293b;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .4s;
    }
    body.dark .field-input {
      background: #1e3352;
      border-color: #2d5080;
      color: #e2e8f0;
    }
    .field-input::placeholder { color: #64748b; opacity: .7; }
    .field-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    body.dark .field-input:focus { border-color: #60a5fa; }

    .field-input::-ms-reveal,
    .field-input::-ms-clear { display: none; }
    .field-input::-webkit-credentials-auto-fill-button { display: none; }

    /* ── PASSWORD WRAPPER ── */
    .pass-wrap {
      position: relative;
    }
    .pass-wrap .field-input {
      padding-right: 2.6rem;
    }
    .eye-btn {
      position: absolute;
      top: 50%;
      right: .75rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #64748b;
      transition: color .2s;
    }
    .eye-btn:hover { color: #2563eb; }
    body.dark .eye-btn { color: #94a3b8; }
    body.dark .eye-btn:hover { color: #60a5fa; }
    .eye-btn svg { width: 18px; height: 18px; }

    /* ── FORGOT ROW ── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: .5rem;
      margin-bottom: .9rem;
    }
    .forgot-link {
      font-size: .85rem;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
      transition: color .2s;
    }
    .forgot-link:hover { color: #60a5fa; }

    /* ── BUTTON ── */
    .btn-primary-custom {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem;
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .4rem;
      letter-spacing: .03em;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(37,99,235,.32);
    }
    .btn-primary-custom:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37,99,235,.4);
    }
    .btn-primary-custom:active { transform: translateY(0); }

    /* ── FOOTER LINK ── */
    .footer-link {
      text-align: center;
      margin-top: 1.1rem;
      font-size: .83rem;
      color: #64748b;
    }
    body.dark .footer-link { color: #94a3b8; }
    .footer-link a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
      transition: color .2s;
    }
    .footer-link a:hover { color: #60a5fa; }

    /* ── TOAST ── */
    .toast-wrap {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      z-index: 999;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .toast-item {
      background: #1a3a6e;
      color: #fff;
      padding: .65rem 1.1rem;
      border-radius: 10px;
      font-size: .85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: toastIn .3s ease both;
    }
    body.dark .toast-item { background: #0f172a; }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(30px); }
      to   { opacity:1; transform: translateX(0); }
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">GR<span>A</span>VE<span>T</span>RACK</div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span class="icon-sun">☀</span>
      <span class="icon-moon">🌙</span>
      <span class="knob"></span>
    </button>
    <a href="signup.html" class="back-btn" aria-label="Go back">&#8249;</a>
  </div>
</nav>

<main>
  <div class="auth-card">

    <div class="tab-wrap">
      <a class="tab-btn active" href="login.html">Log In</a>
      <a class="tab-btn" href="signup.html">Sign Up</a>
    </div>

    <div class="panel-subtitle">Login to access your account</div>

    <div class="form-group">
      <label class="field-label" for="login-name">Name</label>
      <input class="field-input" type="text" id="login-name" placeholder="Enter your username"/>
    </div>

    <div class="form-group">
      <label class="field-label" for="login-password">Password</label>
      <div class="pass-wrap">
        <input class="field-input" type="password" id="login-password" placeholder="Enter your password"/>
        <button type="button" class="eye-btn" onclick="togglePass()" aria-label="Toggle password visibility">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link" onclick="return false;">Forgot Password?</a>
    </div>

    <button class="btn-primary-custom" onclick="handleLogin()">Log In</button>

    <div class="footer-link">
      Don't have an account? <a href="signup.html">Signup Here</a>
    </div>

  </div>
</main>

<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── THEME ──
  const body = document.body;
  const themeToggle = document.getElementById('themeToggle');

  if (localStorage.getItem('theme') === 'dark') body.classList.add('dark');

  themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark');
    localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
  });

  // ── TOGGLE PASSWORD ──
  function togglePass() {
    const input = document.getElementById('login-password');
    const btn = input.closest('.pass-wrap').querySelector('.eye-btn');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
           <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.223-3.592M6.53 6.53A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.293 5.282M15 12a3 3 0 11-5.356-1.857M3 3l18 18"/>
         </svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
           <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
         </svg>`;
  }

  // ── TOAST ──
  function toast(msg, type = 'info') {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast-item';
    el.style.borderLeft = `3px solid ${type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#60a5fa'}`;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }

  // ── VALIDATE ──
  function handleLogin() {
    const name = document.getElementById('login-name').value.trim();
    const pass = document.getElementById('login-password').value;
    if (!name) { toast('Please enter your username.', 'error'); return; }
    if (!pass) { toast('Please enter your password.', 'error'); return; }
    toast('Welcome back! Logging you in…', 'success');
  }
</script>
</body>
</html>
